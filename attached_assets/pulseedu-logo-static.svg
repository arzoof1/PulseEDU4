<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 220 40"
     width="220" height="40"
     role="img" aria-label="PulseEDU">
  <title>PulseEDU</title>
  <defs>
    <linearGradient id="pulseedu-wordmark" x1="0" y1="0" x2="1" y2="1"
                    gradientTransform="rotate(45 0.5 0.5)">
      <stop offset="0%"  stop-color="#0f766e"/>
      <stop offset="60%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="pulseedu-glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="0.9" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- faint EKG trace -->
  <path d="M0 20 H140 L146 16 L150 24 L154 5 L158 35 L162 16 L166 20 H220"
        fill="none" stroke="#dc2626" stroke-opacity="0.3"
        stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- bright pulse, fixed over the dramatic bump (no animation) -->
  <path d="M130 20 H140 L146 16 L150 24 L154 5 L158 35 L162 16 L166 20 H176"
        fill="none" stroke="#dc2626"
        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
        filter="url(#pulseedu-glow)"/>

  <!-- "PulseEDU" wordmark -->
  <text x="29" y="28"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-weight="800" font-size="24" letter-spacing="-0.5"
        fill="url(#pulseedu-wordmark)">Pulse<tspan font-weight="900" font-style="italic" letter-spacing="-0.7" dx="1">EDU</tspan></text>
</svg>
