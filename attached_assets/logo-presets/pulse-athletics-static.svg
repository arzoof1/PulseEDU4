<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 308 40" width="308" height="40" role="img" aria-label="PulseAthletics">
  <title>PulseAthletics</title>
  <defs>
    <linearGradient id="wm" x1="0" y1="0" x2="1" y2="1" gradientTransform="rotate(45 0.5 0.5)">
      <stop offset="0%" stop-color="#15803d"/><stop offset="60%" stop-color="#0d9488"/><stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="0.9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .wordmark, .accent { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; fill: url(#wm); }
      .wordmark { font-weight: 800; font-size: 24px; letter-spacing: -0.02em; }
      .accent   { font-weight: 900; font-size: 24px; letter-spacing: -0.03em; font-style: italic; }
      
    </style>
  </defs>
  <path d="M0 20 H219.6 L225.6 16 L229.6 24 L233.6 5 L237.6 35 L241.6 16 L245.6 20 H308" fill="none" stroke="#f97316" stroke-opacity="0.3" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
  <path class="ekg-pulse" d="M209.6 20 H219.6 L225.6 16 L229.6 24 L233.6 5 L237.6 35 L241.6 16 L245.6 20 H255.6" fill="none" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <text x="12" y="28" class="wordmark">Pulse<tspan class="accent" dx="1">Athletics</tspan></text>
</svg>