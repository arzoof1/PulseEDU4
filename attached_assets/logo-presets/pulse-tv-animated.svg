<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 207 40" width="207" height="40" role="img" aria-label="PulseTV">
  <title>PulseTV</title>
  <defs>
    <linearGradient id="wm" x1="0" y1="0" x2="1" y2="1" gradientTransform="rotate(45 0.5 0.5)">
      <stop offset="0%" stop-color="#0ea5e9"/><stop offset="60%" stop-color="#2563eb"/><stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="0.9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .wordmark, .accent { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; fill: url(#wm); }
      .wordmark { font-weight: 800; font-size: 24px; letter-spacing: -0.02em; }
      .accent   { font-weight: 900; font-size: 24px; letter-spacing: -0.03em; font-style: italic; }
      .ekg-pulse { stroke-dasharray:38 247; stroke-dashoffset:285; animation: pulse-sweep 2.2s linear infinite; } @keyframes pulse-sweep { from { stroke-dashoffset:285; } to { stroke-dashoffset:0; } }
    </style>
  </defs>
  <path d="M0 20 H118.8 L124.8 16 L128.8 24 L132.8 5 L136.8 35 L140.8 16 L144.8 20 H207" fill="none" stroke="#dc2626" stroke-opacity="0.3" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
  <path class="ekg-pulse" d="M0 20 H118.8 L124.8 16 L128.8 24 L132.8 5 L136.8 35 L140.8 16 L144.8 20 H207" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <text x="12" y="28" class="wordmark">Pulse<tspan class="accent" dx="1">TV</tspan></text>
</svg>