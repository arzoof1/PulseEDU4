<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 220 40"
     preserveAspectRatio="xMidYMid meet"
     role="img"
     aria-label="PulseEDU">
  <defs>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="60%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="pulseGlow" x="-20%" y="-100%" width="140%" height="300%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style><![CDATA[
      .ekg-track {
        fill: none;
        stroke: rgba(220, 38, 38, 0.3);
        stroke-width: 1.75;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .ekg-pulse {
        fill: none;
        stroke: #dc2626;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 38 260;
        stroke-dashoffset: 298;
        animation: ekg-sweep 2.2s linear infinite;
      }
      @keyframes ekg-sweep {
        from { stroke-dashoffset: 298; }
        to   { stroke-dashoffset: 0; }
      }
      .wordmark {
        font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        font-weight: 800;
        font-size: 24px;
        letter-spacing: -0.48px;
        fill: url(#brandGrad);
      }
      .wordmark-edu {
        font-style: italic;
        font-weight: 900;
        letter-spacing: -0.72px;
      }
    ]]></style>
  </defs>

  <!-- Faint background EKG track -->
  <path class="ekg-track"
        d="M0 20 H140 L146 16 L150 24 L154 5 L158 35 L162 16 L166 20 H220"/>

  <!-- Wordmark: Pulse + italic EDU, gradient fill matches the app header -->
  <text x="29" y="28" class="wordmark">Pulse<tspan class="wordmark-edu">EDU</tspan></text>

  <!-- Bright animated pulse with soft red glow, sweeps across every 2.2s -->
  <path class="ekg-pulse"
        filter="url(#pulseGlow)"
        d="M0 20 H140 L146 16 L150 24 L154 5 L158 35 L162 16 L166 20 H220"/>
</svg>
