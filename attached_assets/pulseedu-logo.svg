<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 220 40"
     width="220" height="40"
     role="img" aria-label="PulseEDU">
  <title>PulseEDU</title>
  <defs>
    <linearGradient id="pulseedu-wordmark" x1="0" y1="0" x2="1" y2="1"
                    gradientTransform="rotate(45 0.5 0.5)">
      <stop offset="0%"  stop-color="#0f766e"/>
      <stop offset="60%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="pulseedu-glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="0.9" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .ekg-pulse {
        stroke-dasharray: 38 260;
        stroke-dashoffset: 298;
        animation: pulseedu-sweep 2.2s linear infinite;
      }
      @keyframes pulseedu-sweep {
        from { stroke-dashoffset: 298; }
        to   { stroke-dashoffset: 0; }
      }
      .wordmark, .accent {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                     "Helvetica Neue", Arial, sans-serif;
        fill: url(#pulseedu-wordmark);
      }
      .wordmark { font-weight: 800; font-size: 24px; letter-spacing: -0.02em; }
      .accent   { font-weight: 900; font-size: 24px; letter-spacing: -0.03em;
                  font-style: italic; }
    </style>
  </defs>

  <!-- faint EKG trace running full width -->
  <path d="M0 20 H140 L146 16 L150 24 L154 5 L158 35 L162 16 L166 20 H220"
        fill="none" stroke="#dc2626" stroke-opacity="0.3"
        stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- bright animated pulse traveling along the same path -->
  <path class="ekg-pulse"
        d="M0 20 H140 L146 16 L150 24 L154 5 L158 35 L162 16 L166 20 H220"
        fill="none" stroke="#dc2626"
        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
        filter="url(#pulseedu-glow)"/>

  <!-- "PulseEDU" wordmark, gradient-filled. y=27 ~ vertically centered for 24px text in a 40px box -->
  <text x="29" y="28" class="wordmark">Pulse<tspan class="accent" dx="1">EDU</tspan></text>
</svg>
