      required: [entries]
    PulseBrainLabScanSource:
      type: string
      enum: ["phone", "batch"]
    PulseBrainLabWorkSample:
      type: object
      description: >
        A captured student work sample (the completed worksheet photo/scan)
        filed to one (session, student). Staff-only until shared.
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        studentId:
          type: string
        localSisId:
          type: ["string", "null"]
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        objectKey:
          type: string
        pageIndex:
          type: ["integer", "null"]
        source:
          type: string
        shared:
          type: boolean
        createdAt:
          type: string
      required: [id, sessionId, studentId, localSisId, objectKey, source, shared, createdAt]
    PulseBrainLabUnmatchedScan:
      type: object
      description: >
        A scanned page whose QR could not be decoded; awaiting one-tap manual
        assignment in the per-school tray.
      properties:
        id:
          type: integer
        objectKey:
          type: string
        source:
          type: string
        batchLabel:
          type: ["string", "null"]
        pageIndex:
          type: ["integer", "null"]
        status:
          type: string
        createdAt:
          type: string
      required: [id, objectKey, source, status, createdAt]
    RoutePulseBrainLabScanInput:
      type: object
      properties:
        token:
          type: string
        objectPath:
          type: string
        source:
          $ref: "#/components/schemas/PulseBrainLabScanSource"
        pageIndex:
          type: integer
      required: [token, objectPath, source]
    FilePulseBrainLabUnmatchedScanInput:
      type: object
      properties:
        objectPath:
          type: string
        source:
          $ref: "#/components/schemas/PulseBrainLabScanSource"
        batchLabel:
          type: string
        pageIndex:
          type: integer
      required: [objectPath, source]
    AssignPulseBrainLabUnmatchedScanInput:
      type: object
      properties:
        sessionId:
          type: integer
        studentId:
          type: string
      required: [sessionId, studentId]
    BatchPulseBrainLabScanInput:
      type: object
      properties:
        objectPath:
          type: string
        batchLabel:
          type: string
      required: [objectPath]
    PulseBrainLabBatchScanResult:
      type: object
      description: >
        Outcome of server-side decoding a multi-page scanned PDF: pages whose QR
        resolved are filed as work samples (matched); the rest are parked in the
        Unmatched tray.
      properties:
        pageCount:
          type: integer
        matchedCount:
          type: integer
        unmatchedCount:
          type: integer
        matched:
          type: array
          items:
            $ref: "#/components/schemas/PulseBrainLabWorkSample"
        unmatched:
          type: array
          items:
            $ref: "#/components/schemas/PulseBrainLabUnmatchedScan"
      required: [pageCount, matchedCount, unmatchedCount, matched, unmatched]
