kind = "slides"
previewPath = "/pulseedu-district-demo/"
title = "PulseEDU District Demo"
version = "1.0.0"
id = "artifacts/pulseedu-district-demo"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/pulseedu-district-demo/" ]
localPort = 26260

[services.development]
run = "pnpm --filter @workspace/pulseedu-district-demo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pulseedu-district-demo", "run", "build" ]
publicDir = "artifacts/pulseedu-district-demo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26260"
BASE_PATH = "/pulseedu-district-demo/"
