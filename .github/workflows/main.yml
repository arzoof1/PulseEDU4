name: Deploy Production

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy and Conditionally Restart app on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /var/www/PulseEDU4
            
            # Fetch remote and calculate what has changed before hard resetting
            git fetch origin main
            CHANGED_FILES=$(git diff HEAD origin/main --name-only)
            
            git fetch --all
            git reset --hard origin/main
            git pull origin main

            echo "==> Fetching .env files from AWS Secrets Manager (via instance role)"
            unset AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
            
            aws secretsmanager get-secret-value \
                --secret-id pulseedu/frontend/env \
                --query SecretString --output text --region us-east-1 \
                > /var/www/PulseEDU4/artifacts/client/.env
            
            aws secretsmanager get-secret-value \
                --secret-id pulseedu/backend/env \
                --query SecretString --output text --region us-east-1 \
                > /var/www/PulseEDU4/artifacts/api-server/.env
            
            chmod 600 /var/www/PulseEDU4/artifacts/client/.env \
                      /var/www/PulseEDU4/artifacts/api-server/.env
            
            pnpm install
            export PORT=8080
            export BASE_PATH=/
            pnpm run build
            
            # 6. BACKEND Restart Logic
            if echo "$CHANGED_FILES" | grep -q "artifacts/api-server/"; then
              echo "Backend changes detected. Restarting Backend..."
              cd artifacts/api-server
              pm2 restart PulseEDU4-Backend || pm2 start pnpm --name "PulseEDU4-Backend" -- run start
              cd ../../
            else
              echo "No changes in Backend. Skipping restart."
            fi
            
            # 7. FRONTEND Restart Logic
            if echo "$CHANGED_FILES" | grep -q "artifacts/client/"; then
              echo "Frontend changes detected. Restarting Frontend..."
              cd artifacts/client
              pm2 restart PulseEDU4-Frontend || pm2 start pnpm --name "PulseEDU4-Frontend" -- run serve
              cd ../../
            else
              echo "No changes in Frontend. Skipping restart."
            fi
            
            pm2 save
